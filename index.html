<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hari Moviez Verification</title>

<style>

/* ===== THEME ===== */

:root{
--bg:#000;
--text:#fff;
--card:rgba(255,255,255,0.08);
--btn:#2AABEE;
--nav:rgba(255,255,255,0.05);
}

.light-mode{
--bg:#f5f5f5;
--text:#111;
--card:#ffffff;
--btn:#0088cc;
--nav:rgba(255,255,255,0.7);
}

/* ===== BODY ===== */

body{
margin:0;
font-family:Arial, sans-serif;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
transition:0.3s;
}

/* ===== GLASS NAVBAR ===== */

.navbar{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
background:var(--nav);
backdrop-filter:blur(12px);
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.nav-title{
font-weight:bold;
font-size:18px;
}

/* ===== TOGGLE SWITCH ===== */

.toggle{
position:relative;
width:60px;
height:30px;
}

.toggle input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
background:#444;
border-radius:30px;
top:0;
left:0;
right:0;
bottom:0;
transition:0.3s;
}

.slider:before{
position:absolute;
content:"🌙";
height:24px;
width:24px;
left:3px;
top:3px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
transition:0.3s;
}

input:checked + .slider{
background:#FFD54F;
}

input:checked + .slider:before{
transform:translateX(30px);
content:"☀";
}

/* ===== CARD ===== */

.card{
background:var(--card);
padding:35px;
border-radius:18px;
width:90%;
max-width:380px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

.logo{
width:70px;
margin-bottom:10px;
}

/* ===== BUTTONS ===== */

.btn{
display:block;
margin:12px 0;
padding:13px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
background:var(--btn);
color:white;
box-shadow:0 0 10px var(--btn);
transition:0.2s;
}

.btn:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
<div class="nav-title">Hari Moviez</div>

<label class="toggle">
<input type="checkbox" id="themeToggle">
<span class="slider"></span>
</label>

</div>

<!-- CARD -->

<div class="card">

<img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">

<h2>Verify Access</h2>

<p>Join our Telegram channel and group</p>

<a class="btn" href="https://t.me/hari_movies" target="_blank">
📢 Join Channel
</a>

<a class="btn" href="https://t.me/iPopcornMoviesGroups" target="_blank">
👥 Join Group
</a>

<a class="btn" href="https://t.me/HK_Filterx_Bot" target="_blank">
🤖 Open Bot
</a>

</div>

<script>

/* LOAD SAVED THEME */

const toggle=document.getElementById("themeToggle")

if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light-mode")
toggle.checked=true
}

/* TOGGLE THEME */

toggle.addEventListener("change",function(){

if(this.checked){
document.body.classList.add("light-mode")
localStorage.setItem("theme","light")
}else{
document.body.classList.remove("light-mode")
localStorage.setItem("theme","dark")
}

})

</script>

</body>
</html>
