<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hari Moviez Verification</title>

<style>

/* ===== THEME VARIABLES ===== */

:root{
--bg-color:#0e1621;
--card-bg:rgba(255,255,255,0.08);
--text-color:#ffffff;
--btn-color:#2AABEE;
--overlay:rgba(0,0,0,0.65);
}

.light-mode{
--bg-color:#f5f5f5;
--card-bg:rgba(255,255,255,0.8);
--text-color:#111;
--btn-color:#0088cc;
--overlay:rgba(255,255,255,0.4);
}

/* ===== BODY ===== */

body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:var(--text-color);
background:url("https://images.alphacoders.com/121/1219872.jpg") center/cover no-repeat fixed;
transition:0.3s;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:var(--overlay);
z-index:-1;
}

/* ===== DARK LIGHT BUTTON ===== */

.theme-toggle{
position:fixed;
top:20px;
right:20px;
background:var(--card-bg);
border:1px solid rgba(255,255,255,0.2);
padding:10px 14px;
border-radius:30px;
cursor:pointer;
font-size:18px;
backdrop-filter:blur(10px);
}

/* ===== CARD ===== */

.card{
backdrop-filter:blur(18px);
background:var(--card-bg);
border:1px solid rgba(255,255,255,0.2);
padding:35px;
border-radius:20px;
width:90%;
max-width:380px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
transition:0.3s;
}

.logo{
width:70px;
margin-bottom:10px;
}

/* ===== TITLE ===== */

h2{
margin-top:5px;
margin-bottom:10px;
font-weight:600;
}

p{
font-size:14px;
opacity:0.8;
}

/* ===== BUTTONS ===== */

.btn{
display:block;
margin:12px 0;
padding:13px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
background:var(--btn-color);
color:white;
transition:0.25s;
box-shadow:0 0 10px var(--btn-color);
}

.btn:hover{
transform:translateY(-2px) scale(1.04);
box-shadow:0 5px 20px var(--btn-color);
}

/* ===== MOBILE ===== */

@media(max-width:500px){

.card{
padding:25px;
}

}

</style>
</head>

<body>

<div class="theme-toggle" onclick="toggleTheme()">🌙</div>

<div class="card">

<img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">

<h2>Verify Access</h2>

<p>Join our Telegram channel and group to continue</p>

<a class="btn" href="https://t.me/hari_movies" target="_blank">
📢 JOIN CHANNEL
</a>

<a class="btn" href="https://t.me/iPopcornMoviesGroups" target="_blank">
👥 JOIN GROUP
</a>

<a class="btn" href="https://t.me/HK_Filterx_Bot" target="_blank">
🤖 OPEN BOT
</a>

</div>

<script>

/* DARK LIGHT MODE */

function toggleTheme(){

document.body.classList.toggle("light-mode");

let btn=document.querySelector(".theme-toggle");

if(document.body.classList.contains("light-mode")){
btn.innerHTML="☀️";
}else{
btn.innerHTML="🌙";
}

}

</script>

</body>
</html>
